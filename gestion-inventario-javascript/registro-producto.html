<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/producto.js" defer></script>
</head>
<body>
    <div class="contenedor-login">
        <div class="contenedor-candado">
                <img src="images/circulocandado.png" alt="card">
        </div>
        <div class="sesion">
            <h1>Bienvenido</h1>
            <p>Registre su producto para continuar</p>
        </div>
        <br>
        <h3>Nombre del producto</h3>
        <div class="campo">
        <input class="Username" type="text" producto="producto" placeholder="Ingrese nombre del producto" />
        </div>
        <br>
        <h3>Precio del producto</h3>
        <div class="campo">
             <input class="password" type="text" precio="precio" placeholder="Ingrese precio del producto" />
        </div>
        <br>
        <h3>Stock del producto</h3>
        <div class="campo">
        <input class="name" type="text" stock="stock" placeholder="Ingrese stock del producto" />
        </div>
        <br>
        <button id="login">Registrarme producto</button>
    </div>
</body>
</html>
