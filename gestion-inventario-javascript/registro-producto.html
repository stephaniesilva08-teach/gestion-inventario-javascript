<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Producto</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/registro-producto.js" defer></script>
</head>

<body>
    <menu-lateral></menu-lateral>
    <div class="contenedor-login">
        <div class="contenedor-candado">
            <img src="images/circulocandado.png" alt="card">
        </div>
        <div class="sesion">
            <h1>Bienvenido</h1>
            <p>Registre su producto para continuar</p>
            <form>
        </div>
        <br>
        <h3>Codigo del producto</h3>
        <div class="campo">
            <input class="name" id="codigo" type="text" id="stock" placeholder="Ingrese codigo del producto"/>
        </div>
        <h3>Nombre del producto</h3>
        <div class="campo">
            <input class="Username" id="name" type="text" id="producto" placeholder="Ingrese nombre del producto" />
        </div>
        <h3>Proveedor del producto</h3>
        <div class="campo">
            <input class="password" id="proveedor" type="text" id="precio"
                placeholder="Ingrese proveedor del producto" />
        </div>
        <h3>Tipo de producto</h3>
        <div class="campo">
            <input class="materia" name="tipo" value="Materia Prima">
        </div>
        </form>
        <br>
        <button id="login">Registrar producto</button>
    </div>
</body>

</html>
